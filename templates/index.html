<!DOCTYPE html>
<html>
<head>
    <title>AiPenPal — AI Writing Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #060612;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* Animated background orbs */
        .bg {
            position: fixed; inset: 0; z-index: 0;
            background: #060612;
            overflow: hidden;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: float 8s ease-in-out infinite;
        }
        .orb1 { width: 500px; height: 500px; background: #6366f1; top: -100px; left: -100px; animation-delay: 0s; }
        .orb2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -100px; right: -80px; animation-delay: 2s; }
        .orb3 { width: 300px; height: 300px; background: #06b6d4; top: 40%; left: 40%; animation-delay: 4s; }
        .orb4 { width: 250px; height: 250px; background: #ec4899; bottom: 20%; left: 10%; animation-delay: 1s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20px, -20px) scale(1.05); }
            66% { transform: translate(-15px, 15px) scale(0.95); }
        }

        .wrapper {
            position: relative; z-index: 1;
            min-height: 100vh;
            padding: 40px 20px 60px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        /* Glass mixin */
        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
        }

        /* Header */
        .header { text-align: center; margin-bottom: 40px; }
        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(99,102,241,0.2);
            border: 1px solid rgba(99,102,241,0.4);
            color: #a5b4fc; font-size: 11px; padding: 5px 16px;
            border-radius: 20px; letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 16px;
        }
        .badge::before { content: "●"; color: #6366f1; font-size: 8px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .header h1 {
            font-size: clamp(32px, 5vw, 52px);
            font-weight: 800; letter-spacing: -2px; line-height: 1.1;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 50%, #ec4899 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p { color: rgba(255,255,255,0.35); margin-top: 10px; font-size: 14px; font-weight: 400; }

        /* Layout */
        .main-layout { display: grid; grid-template-columns: 1fr 300px; gap: 16px; }

        /* Input card */
        .input-card { padding: 24px; }

        textarea {
            width: 100%; height: 180px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 16px;
            font-size: 15px; color: #e2e8f0;
            resize: vertical; outline: none;
            font-family: 'Inter', sans-serif;
            transition: border 0.3s; line-height: 1.7;
        }
        textarea:focus { border-color: rgba(99,102,241,0.6); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        textarea::placeholder { color: rgba(255,255,255,0.2); }

        .meta { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: rgba(255,255,255,0.25); }

        .lang-row {
            display: flex; align-items: center; gap: 10px;
            margin-top: 14px; padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .lang-row label { font-size: 12px; color: rgba(255,255,255,0.4); white-space: nowrap; }
        .lang-input {
            flex: 1; background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; padding: 8px 14px;
            color: #e2e8f0; font-size: 13px; outline: none;
            font-family: 'Inter', sans-serif; transition: border 0.3s;
        }
        .lang-input:focus { border-color: rgba(99,102,241,0.5); }

        /* Buttons */
        .buttons { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 16px; }
        .btn {
            padding: 14px 8px; border: none; border-radius: 14px;
            font-size: 12px; font-weight: 600; cursor: pointer;
            transition: all 0.25s; display: flex;
            flex-direction: column; align-items: center; gap: 5px;
            backdrop-filter: blur(10px); position: relative; overflow: hidden;
        }
        .btn::after {
            content: ""; position: absolute; inset: 0;
            background: white; opacity: 0; transition: opacity 0.2s;
        }
        .btn:hover::after { opacity: 0.05; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .btn:active { transform: translateY(0); }
        .btn span.icon { font-size: 20px; }
        .btn span.lbl { font-size: 10px; opacity: 0.7; }

        .btn-improve  { background: rgba(99,102,241,0.2);  border: 1px solid rgba(99,102,241,0.35);  color: #a5b4fc; }
        .btn-grammar  { background: rgba(16,185,129,0.2);  border: 1px solid rgba(16,185,129,0.35);  color: #6ee7b7; }
        .btn-shorter  { background: rgba(245,158,11,0.2);  border: 1px solid rgba(245,158,11,0.35);  color: #fcd34d; }
        .btn-expand   { background: rgba(6,182,212,0.2);   border: 1px solid rgba(6,182,212,0.35);   color: #67e8f9; }
        .btn-summarize{ background: rgba(139,92,246,0.2);  border: 1px solid rgba(139,92,246,0.35);  color: #c4b5fd; }
        .btn-translate{ background: rgba(236,72,153,0.2);  border: 1px solid rgba(236,72,153,0.35);  color: #f9a8d4; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

        /* Progress */
        .progress-bar {
            height: 2px; margin-top: 16px; border-radius: 2px;
            background: rgba(255,255,255,0.06); overflow: hidden; display: none;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #ec4899, #06b6d4);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
        }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* Output */
        .output-card { padding: 22px; display: none; margin-top: 14px; animation: fadeUp 0.35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .output-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .output-label {
            font-size: 10px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #a5b4fc, #ec4899);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .output-actions { display: flex; gap: 8px; }
        .action-btn {
            padding: 5px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: rgba(255,255,255,0.45);
            font-size: 11px; cursor: pointer; transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .action-btn:hover { border-color: rgba(99,102,241,0.5); color: #a5b4fc; }
        .action-btn.success { border-color: rgba(16,185,129,0.5); color: #6ee7b7; }
        #output { font-size: 15px; color: rgba(255,255,255,0.75); line-height: 1.9; white-space: pre-wrap; }

        /* History */
        .history-panel { padding: 20px; height: fit-content; position: sticky; top: 20px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .history-title {
            font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
            background: linear-gradient(90deg, #a5b4fc, #ec4899);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .clear-btn { font-size: 10px; color: rgba(255,255,255,0.25); background: none; border: none; cursor: pointer; font-family: 'Inter', sans-serif; transition: color 0.2s; }
        .clear-btn:hover { color: #f9a8d4; }
        .history-empty { text-align: center; padding: 32px 10px; color: rgba(255,255,255,0.2); font-size: 12px; line-height: 2; }
        .history-empty span { font-size: 28px; display: block; margin-bottom: 8px; }

        .history-item {
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px; padding: 12px;
            margin-bottom: 8px; cursor: pointer;
            transition: all 0.2s;
        }
        .history-item:hover { border-color: rgba(99,102,241,0.4); background: rgba(99,102,241,0.08); transform: translateX(3px); }
        .history-item-mode { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .history-item-input { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item-output { font-size: 11px; color: rgba(255,255,255,0.55); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item-time { font-size: 9px; color: rgba(255,255,255,0.18); margin-top: 6px; }

        /* Divider */
        .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 14px 0; }

        @media(max-width:700px) {
            .main-layout { grid-template-columns: 1fr; }
            .buttons { grid-template-columns: repeat(2,1fr); }
        }
    </style>
</head>
<body>
<div class="bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="orb orb4"></div>
</div>

<div class="wrapper">
<div class="container">
    <div class="header">
        <div class="badge">AI Powered Writing</div>
        <h1>AiPenPal</h1>
        <p>6 powerful AI tools to transform your writing instantly</p>
    </div>

    <div class="main-layout">
        <div>
            <div class="glass input-card">
                <textarea id="inputText" placeholder="Start writing or paste your text here..." oninput="updateMeta()"></textarea>
                <div class="meta">
                    <span>📝 <span id="wordCount">0</span> words</span>
                    <span><span id="charCount">0</span> characters</span>
                </div>
                <div class="divider"></div>
                <div class="lang-row">
                    <label>🌍 Translate to:</label>
                    <input class="lang-input" id="langInput" placeholder="e.g. Hindi, Spanish, French..." />
                </div>
                <div class="buttons">
                    <button class="btn btn-improve" onclick="improve('improve')">
                        <span class="icon">✨</span><span>Improve</span><span class="lbl">Make it better</span>
                    </button>
                    <button class="btn btn-grammar" onclick="improve('grammar')">
                        <span class="icon">✅</span><span>Fix Grammar</span><span class="lbl">Fix mistakes</span>
                    </button>
                    <button class="btn btn-shorter" onclick="improve('shorter')">
                        <span class="icon">✂️</span><span>Shorten</span><span class="lbl">Make it brief</span>
                    </button>
                    <button class="btn btn-expand" onclick="improve('expand')">
                        <span class="icon">📝</span><span>Expand</span><span class="lbl">Add more detail</span>
                    </button>
                    <button class="btn btn-summarize" onclick="improve('summarize')">
                        <span class="icon">📋</span><span>Summarize</span><span class="lbl">Key points</span>
                    </button>
                    <button class="btn btn-translate" onclick="improve('translate')">
                        <span class="icon">🌍</span><span>Translate</span><span class="lbl">Any language</span>
                    </button>
                </div>
                <div class="progress-bar" id="progressBar"><div class="progress-fill"></div></div>
            </div>

            <div class="glass output-card" id="outputCard">
                <div class="output-top">
                    <span class="output-label">✦ AI Result</span>
                    <div class="output-actions">
                        <button class="action-btn" id="copyBtn" onclick="copyText()">Copy</button>
                        <button class="action-btn" onclick="clearAll()">Clear</button>
                    </div>
                </div>
                <div id="output"></div>
            </div>
        </div>

        <div class="glass history-panel">
            <div class="history-header">
                <span class="history-title">📜 History</span>
                <button class="clear-btn" onclick="clearHistory()">Clear all</button>
            </div>
            <div id="historyList">
                <div class="history-empty"><span>✦</span>Your last 10 results<br>will appear here</div>
            </div>
        </div>
    </div>
</div>
</div>

<script>
    const modeColors = { improve:"#a5b4fc", grammar:"#6ee7b7", shorter:"#fcd34d", expand:"#67e8f9", summarize:"#c4b5fd", translate:"#f9a8d4" };
    const modeLabels = { improve:"✨ Improve", grammar:"✅ Grammar", shorter:"✂️ Shorten", expand:"📝 Expand", summarize:"📋 Summarize", translate:"🌍 Translate" };

    function updateMeta() {
        const t = document.getElementById("inputText").value;
        document.getElementById("charCount").textContent = t.length;
        document.getElementById("wordCount").textContent = t.trim() ? t.trim().split(/\s+/).length : 0;
    }

    function loadHistory() { try { return JSON.parse(localStorage.getItem("aipenpal_history")||"[]"); } catch { return []; } }
    function saveHistory(h) { localStorage.setItem("aipenpal_history", JSON.stringify(h)); }

    function renderHistory() {
        const h = loadHistory();
        const list = document.getElementById("historyList");
        if (!h.length) { list.innerHTML = '<div class="history-empty"><span>✦</span>Your last 10 results<br>will appear here</div>'; return; }
        list.innerHTML = h.map((item,i) => `
            <div class="history-item" onclick="loadHistoryItem(${i})">
                <div class="history-item-mode" style="color:${modeColors[item.mode]}">${modeLabels[item.mode]}</div>
                <div class="history-item-input">${item.input}</div>
                <div class="history-item-output">${item.output}</div>
                <div class="history-item-time">${item.time}</div>
            </div>`).join("");
    }

    function addToHistory(mode, input, output) {
        const h = loadHistory();
        h.unshift({ mode, input, output, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
        if (h.length > 10) h.pop();
        saveHistory(h); renderHistory();
    }

    function loadHistoryItem(i) {
        const item = loadHistory()[i];
        document.getElementById("inputText").value = item.input;
        document.getElementById("output").textContent = item.output;
        document.getElementById("outputCard").style.display = "block";
        updateMeta();
    }

    function clearHistory() { localStorage.removeItem("aipenpal_history"); renderHistory(); }

    async function improve(mode) {
        const text = document.getElementById("inputText").value.trim();
        if (!text) return;
        if (mode==="translate" && !document.getElementById("langInput").value.trim()) { alert("Please enter a language!"); return; }

        document.querySelectorAll(".btn").forEach(b => b.disabled = true);
        document.getElementById("progressBar").style.display = "block";
        document.getElementById("outputCard").style.display = "none";

        const res = await fetch("/improve", {
            method: "POST", headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ text, mode, lang: document.getElementById("langInput").value.trim() })
        });
        const data = await res.json();

        document.getElementById("progressBar").style.display = "none";
        document.getElementById("outputCard").style.display = "block";
        document.getElementById("output").textContent = data.result;
        addToHistory(mode, text, data.result);
        document.querySelectorAll(".btn").forEach(b => b.disabled = false);
    }

    function copyText() {
        navigator.clipboard.writeText(document.getElementById("output").textContent);
        const btn = document.getElementById("copyBtn");
        btn.textContent = "Copied ✓"; btn.classList.add("success");
        setTimeout(()=>{ btn.textContent="Copy"; btn.classList.remove("success"); }, 2000);
    }

    function clearAll() {
        document.getElementById("inputText").value = "";
        document.getElementById("outputCard").style.display = "none";
        updateMeta();
    }

    renderHistory();
</script>
</body>
</html>
